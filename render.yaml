services:
  # PHP Web Application with persistent SQLite database
  - type: web
    name: billing-system
    env: docker
    plan: starter # Note: Starter plan is required on Render if using a persistent disk
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 80
    disk:
      name: sqlite-data
      mountPath: /var/www/html/db-data
      sizeGB: 1
