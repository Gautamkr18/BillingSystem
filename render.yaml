services:
  # PHP Web Application — uses PostgreSQL on Render, SQLite locally
  - type: web
    name: billing-system
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 80
      # DATABASE_URL is automatically injected from the free PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: billing-system-db
          property: connectionString

databases:
  # Free PostgreSQL database (persistent — survives container restarts)
  # Note: Render free databases expire after 90 days — recreate and run /migrate.php to restore schema
  - name: billing-system-db
    plan: free
    databaseName: billing_system
    user: billing_user
