dbs:
  - path: /var/www/html/database/billing_system.sqlite
    replicas:
      - type: s3
        bucket: ${R2_BUCKET}
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        region: auto
        # Sync every hour to stay comfortably within Cloudflare R2 free tier limits
        # (1M Class A operations/month free — 1h interval uses ~720 ops/month)
        sync-interval: 1h
        # Keep snapshots for 7 days to allow point-in-time recovery
        retention: 7d
        retention-check-interval: 24h
